version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: unredacted-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: unredacted-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=unredacted
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: unredacted-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ETL Worker (optional - run manually for now)
  # etl-worker:
  #   build: ./etl
  #   container_name: unredacted-etl
  #   depends_on:
  #     - neo4j
  #     - postgres
  #     - redis
  #   environment:
  #     - NEO4J_URI=bolt://neo4j:7687
  #     - POSTGRES_URI=postgresql://postgres:password@postgres:5432/unredacted
  #     - REDIS_URL=redis://redis:6379/0

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
